<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="Inter, 'Noto Sans TC', system-ui, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64748b"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="520" rx="12" fill="url(#bg)" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">雙鴻科技 — 監控整合架構</text>

  <!-- Source boxes -->
  <rect x="80" y="60" width="200" height="72" rx="8" fill="#fff" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="180" y="88" text-anchor="middle" font-weight="600" fill="#0891b2">Graylog</text>
  <text x="180" y="108" text-anchor="middle" font-size="11" fill="#64748b">SIEM / Log 管理平台</text>

  <rect x="440" y="60" width="200" height="72" rx="8" fill="#fff" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="540" y="88" text-anchor="middle" font-weight="600" fill="#0891b2">LibreNMS</text>
  <text x="540" y="108" text-anchor="middle" font-size="11" fill="#64748b">網路 / 設備監控平台</text>

  <!-- Arrows from sources -->
  <line x1="180" y1="132" x2="180" y2="168" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="180" y="158" text-anchor="middle" font-size="10" fill="#94a3b8">HTTP Notification</text>

  <line x1="540" y1="132" x2="540" y2="168" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="540" y="158" text-anchor="middle" font-size="10" fill="#94a3b8">API Transport</text>

  <!-- Webhook endpoint -->
  <rect x="100" y="175" width="520" height="56" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="360" y="200" text-anchor="middle" font-weight="600" fill="#06b6d4" font-size="14">Arova Nexus Incident Webhook</text>
  <text x="360" y="218" text-anchor="middle" font-size="10" fill="#94a3b8" font-family="monospace">POST /api/v1/incidents/webhook/generic  (API Key 認證)</text>

  <!-- Arrow to mapping -->
  <line x1="360" y1="231" x2="360" y2="264" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Payload Mapping -->
  <rect x="200" y="270" width="320" height="48" rx="8" fill="#fff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="360" y="296" text-anchor="middle" font-weight="600" fill="#92400e">Payload Mapping</text>
  <text x="360" y="312" text-anchor="middle" font-size="10" fill="#b45309">欄位對應 + 嚴重度轉換</text>

  <!-- Arrow to incident -->
  <line x1="360" y1="318" x2="360" y2="348" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Create Incident -->
  <rect x="200" y="354" width="320" height="48" rx="8" fill="#fff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="360" y="380" text-anchor="middle" font-weight="600" fill="#7c3aed">建立 Incident</text>
  <text x="360" y="396" text-anchor="middle" font-size="10" fill="#8b5cf6">10 秒內自動完成</text>

  <!-- Fork arrows -->
  <line x1="300" y1="402" x2="220" y2="440" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="420" y1="402" x2="500" y2="440" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- AI Summary -->
  <rect x="100" y="446" width="220" height="52" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="210" y="470" text-anchor="middle" font-weight="600" fill="#7c3aed" font-size="12">AI 分析摘要</text>
  <text x="210" y="488" text-anchor="middle" font-size="10" fill="#8b5cf6">30 秒內自動產生</text>

  <!-- Notification -->
  <rect x="400" y="446" width="220" height="52" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="510" y="470" text-anchor="middle" font-weight="600" fill="#16a34a" font-size="12">通知 IT 維運</text>
  <text x="510" y="488" text-anchor="middle" font-size="10" fill="#22c55e">依嚴重度決定通知方式</text>
</svg>
