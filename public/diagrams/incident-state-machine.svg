<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" font-family="Inter, 'Noto Sans TC', system-ui, sans-serif" font-size="12">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64748b"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#ef4444"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="640" height="480" rx="12" fill="#fafbfc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="320" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">事件狀態機 (Incident State Machine)</text>

  <!-- Triggered -->
  <rect x="220" y="50" width="140" height="44" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="290" y="70" text-anchor="middle" font-weight="700" fill="#dc2626">觸發</text>
  <text x="290" y="86" text-anchor="middle" font-size="10" fill="#ef4444">Triggered</text>

  <!-- Arrow: Triggered → Acknowledged -->
  <line x1="290" y1="94" x2="290" y2="128" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="296" y="115" font-size="9" fill="#94a3b8">確認</text>

  <!-- Arrow: Triggered → Closed (false positive) -->
  <line x1="360" y1="72" x2="530" y2="72" stroke="#ef4444" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <text x="445" y="64" font-size="9" fill="#ef4444">誤報關閉</text>

  <!-- Acknowledged -->
  <rect x="220" y="134" width="140" height="44" rx="8" fill="#fefce8" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="290" y="154" text-anchor="middle" font-weight="700" fill="#d97706">已確認</text>
  <text x="290" y="170" text-anchor="middle" font-size="10" fill="#f59e0b">Acknowledged</text>

  <!-- Arrow: Acknowledged → Investigating -->
  <line x1="290" y1="178" x2="290" y2="212" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="296" y="199" font-size="9" fill="#94a3b8">開始調查</text>

  <!-- Investigating -->
  <rect x="220" y="218" width="140" height="44" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="290" y="238" text-anchor="middle" font-weight="700" fill="#2563eb">調查中</text>
  <text x="290" y="254" text-anchor="middle" font-size="10" fill="#3b82f6">Investigating</text>

  <!-- Arrow: Investigating → Mitigating -->
  <line x1="290" y1="262" x2="290" y2="296" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="296" y="283" font-size="9" fill="#94a3b8">開始修復</text>

  <!-- Mitigating -->
  <rect x="220" y="302" width="140" height="44" rx="8" fill="#faf5ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="290" y="322" text-anchor="middle" font-weight="700" fill="#7c3aed">處理中</text>
  <text x="290" y="338" text-anchor="middle" font-size="10" fill="#8b5cf6">Mitigating</text>

  <!-- Arrow: Mitigating → Resolved -->
  <line x1="290" y1="346" x2="290" y2="380" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="296" y="367" font-size="9" fill="#94a3b8">系統恢復</text>

  <!-- Resolved -->
  <rect x="220" y="386" width="140" height="44" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="290" y="406" text-anchor="middle" font-weight="700" fill="#16a34a">已解決</text>
  <text x="290" y="422" text-anchor="middle" font-size="10" fill="#22c55e">Resolved</text>

  <!-- Arrow: Resolved → Closed -->
  <line x1="360" y1="408" x2="530" y2="408" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="445" y="400" font-size="9" fill="#94a3b8">事後回顧完成 / 48h 自動</text>

  <!-- Closed -->
  <rect x="530" y="50" width="100" height="380" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="580" y="250" text-anchor="middle" font-weight="700" fill="#475569" transform="rotate(-90, 580, 250)" font-size="14">已關閉 Closed</text>

  <!-- Arrow: Resolved → Investigating (recurrence) -->
  <path d="M220,408 C120,408 120,240 220,240" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-amber)"/>
  <text x="100" y="320" font-size="9" fill="#f59e0b" text-anchor="middle">問題復發</text>

  <!-- Legend -->
  <rect x="20" y="444" width="600" height="28" rx="6" fill="#f1f5f9"/>
  <line x1="40" y1="458" x2="70" y2="458" stroke="#64748b" stroke-width="1.5"/>
  <text x="78" y="462" font-size="10" fill="#64748b">正常流程</text>
  <line x1="180" y1="458" x2="210" y2="458" stroke="#ef4444" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="218" y="462" font-size="10" fill="#ef4444">誤報關閉</text>
  <line x1="320" y1="458" x2="350" y2="458" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="358" y="462" font-size="10" fill="#f59e0b">問題復發</text>
</svg>
